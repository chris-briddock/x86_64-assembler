name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make

    - name: Build assembler
      run: make all

    - name: Run unit tests
      run: make test-unit

    - name: Run integration tests
      run: make test-integration

    - name: Test example programs
      run: |
        for f in examples/*.asm; do
          echo "Testing $f..."
          ./bin/x86_64-asm "$f" -o test_out
          chmod +x test_out
          ./test_out
          echo "Exit code: $?"
          echo
        done
      continue-on-error: true
